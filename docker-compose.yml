version: '3.4'

services:
  web-api:
    image: ${DOCKER_REGISTRY-}flight-advisor-ca
    container_name: web-api
    build:
      context: .
      dockerfile: src/Web.Api/Dockerfile
    ports:
      - 8080:8080

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      - POSTGRES_DB=watch_advisor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/db:/var/lib/postgresql/data
    ports:
      - 5433:5432

  seq:
    image: datalust/seq:latest
    container_name: seq
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - 5341:5341
      - 8081:80

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - '6379:6379'
